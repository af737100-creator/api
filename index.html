<!DOCTYPE html>
<html dir="rtl" lang="ar">
<body>
    <h2>لوحة تحكم الفحص المتقدم</h2>
    <input type="text" id="ipInput" placeholder="أدخل الـ IP">
    
    <select id="toolSelect">
        <option value="1">1. فحص المنافذ الشائعة</option>
        <option value="2">2. كشف خدمات الويب (HTTP)</option>
        <option value="3">3. فحص بروتوكول FTP</option>
        <option value="4">4. فحص بروتوكول Telnet</option>
        <option value="5">5. فحص منفذ Winbox</option>
        <option value="6">6. فحص خدمات API</option>
        <option value="7">7. فحص SSH (الأمان)</option>
        <option value="8">8. اختبار زمن الاستجابة (Ping)</option>
        <option value="9">9. فحص المنافذ العشوائية العالية</option>
        <option value="10">10. فحص كامل وشامل</option>
    </select>
    
    <button onclick="startScan()">بدء الفحص</button>
    <div id="results"></div>

    <script>
        async function startScan() {
            const ip = document.getElementById('ipInput').value;
            const tool = document.getElementById('toolSelect').value;
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "جاري تنفيذ الأداة رقم " + tool + "...";
            const response = await fetch(`/scan?ip=${ip}&tool_id=${tool}`);
            const data = await response.json();
            resDiv.innerHTML = "<pre>" + JSON.stringify(data.results, null, 2) + "</pre>";
        }
    </script>
</body>
</html>
