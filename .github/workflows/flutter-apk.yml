name: Build Flutter APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Initialize Complete Flutter Project On-the-fly
        run: |
          # Create a temp dir to back up our custom source files
          mkdir -p temp_flutter_src
          cp -f mobile_app/lib/main.dart temp_flutter_src/main.dart || true
          cp -f mobile_app/pubspec.yaml temp_flutter_src/pubspec.yaml || true
          
          # Clean and re-create a standard Flutter app wrapper with the matching project name
          rm -rf mobile_app
          flutter create --org com.mikrotik.scanner --project-name microtik_scanner mobile_app
          
          # Inject our actual custom source files back into the generated project
          cp -f temp_flutter_src/main.dart mobile_app/lib/main.dart || true
          cp -f temp_flutter_src/pubspec.yaml mobile_app/pubspec.yaml || true
          
          # Clean up temp
          rm -rf temp_flutter_src

      - name: Download App Dependencies
        run: |
          cd mobile_app
          flutter pub get

      - name: Compile Release APK (Universal Build)
        run: |
          cd mobile_app
          flutter build apk --release

      - name: Upload Release APK Product
        uses: actions/upload-artifact@v4
        with:
          name: MikroTik-Scanner-Release-APK
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
